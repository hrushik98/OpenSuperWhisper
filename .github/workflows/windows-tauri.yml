name: Build Windows App (Tauri)

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: opensuperwhisper-tauri/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: opensuperwhisper-tauri/src-tauri -> target

      - name: Install dependencies (NSIS)
        run: |
          # NSIS is pre-installed on GitHub windows-latest runner, but we ensure it is in PATH
          echo "C:\Program Files (x86)\NSIS" >> $GITHUB_PATH

      - name: Install Frontend Dependencies
        working-directory: opensuperwhisper-tauri
        run: npm ci || npm install

      - name: Build Frontend & Tauri App
        working-directory: opensuperwhisper-tauri
        run: npm run tauri build

      - name: Upload NSIS Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenSuperWhisper-Windows-Installers
          path: |
            opensuperwhisper-tauri/src-tauri/target/release/bundle/nsis/*.exe
            opensuperwhisper-tauri/src-tauri/target/release/bundle/msi/*.msi

      - name: Create Release and Upload Assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            opensuperwhisper-tauri/src-tauri/target/release/bundle/nsis/*.exe
            opensuperwhisper-tauri/src-tauri/target/release/bundle/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
